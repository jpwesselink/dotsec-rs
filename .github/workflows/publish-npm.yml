name: Publish CLI to NPM

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 5.0.0)'
        required: true

jobs:
  resolve-version:
    name: Resolve version
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'dotsec-v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Version comes from Cargo.toml (managed by release-plz)
          CARGO_VERSION=$(grep '^version' dotsec/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            BRANCH_SLUG=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9.-]/-/g')
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "version=${CARGO_VERSION}-${BRANCH_SLUG}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^.*-v//')
            echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${CARGO_VERSION}-beta.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=beta" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Print version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "NPM tag: ${{ steps.version.outputs.npm-tag }}"

  build:
    name: Build ${{ matrix.npm_pkg }}
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm_pkg: dotsec-linux-x64-gnu
            binary: dotsec
            can_test: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm_pkg: dotsec-linux-arm64-gnu
            binary: dotsec
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            npm_pkg: dotsec-darwin-x64
            binary: dotsec
          - target: aarch64-apple-darwin
            runner: macos-14
            npm_pkg: dotsec-darwin-arm64
            binary: dotsec
            can_test: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm_pkg: dotsec-win32-x64-msvc
            binary: dotsec.exe
            can_test: true
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            npm_pkg: dotsec-win32-arm64-msvc
            binary: dotsec.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p dotsec
          else
            cargo build --release --target ${{ matrix.target }} -p dotsec
          fi

      - name: Copy binary into npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} dotsec/npm/${{ matrix.npm_pkg }}/

      - name: Smoke test binary
        if: matrix.can_test
        shell: bash
        run: |
          chmod +x dotsec/npm/${{ matrix.npm_pkg }}/${{ matrix.binary }}
          dotsec/npm/${{ matrix.npm_pkg }}/${{ matrix.binary }} --help
          dotsec/npm/${{ matrix.npm_pkg }}/${{ matrix.binary }} --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm version
        working-directory: dotsec/npm/${{ matrix.npm_pkg }}
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${{ needs.resolve-version.outputs.version }}"

      - name: Publish platform package
        working-directory: dotsec/npm/${{ matrix.npm_pkg }}
        run: npm publish --tag ${{ needs.resolve-version.outputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meta:
    name: Publish meta-package
    needs: [resolve-version, build]
    if: always() && needs.resolve-version.result == 'success' && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        working-directory: dotsec/npm/dotsec
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish meta-package
        working-directory: dotsec/npm/dotsec
        run: npm publish --tag ${{ needs.resolve-version.outputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify:
    name: Verify published CLI
    needs: [resolve-version, publish-meta]
    if: needs.publish-meta.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and test CLI from npm
        run: |
          npm install -g dotsec@${{ needs.resolve-version.outputs.version }}
          dotsec --version
          dotsec --help
