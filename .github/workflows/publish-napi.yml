name: Publish Core npm package

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 5.0.0)'
        required: true

jobs:
  resolve-version:
    name: Resolve version
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'dotsec-core-v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' dotsec-napi/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            BRANCH_SLUG=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9.-]/-/g')
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "version=${CARGO_VERSION}-${BRANCH_SLUG}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^.*-v//')
            echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${CARGO_VERSION}-beta.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=beta" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Print version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "NPM tag: ${{ steps.version.outputs.npm-tag }}"

  build:
    name: Build ${{ matrix.npm_pkg }}
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            npm_pkg: dotsec-core-linux-x64-gnu
            can_test: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            npm_pkg: dotsec-core-linux-arm64-gnu
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            npm_pkg: dotsec-core-darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-14
            npm_pkg: dotsec-core-darwin-arm64
            can_test: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            npm_pkg: dotsec-core-win32-x64-msvc
            can_test: true
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            npm_pkg: dotsec-core-win32-arm64-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build native module
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p dotsec-napi
          else
            cargo build --release --target ${{ matrix.target }} -p dotsec-napi
          fi

      - name: Copy .node file into npm package
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/dotsec_napi.dll dotsec-napi/npm/${{ matrix.npm_pkg }}/dotsec-core.node
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp target/${{ matrix.target }}/release/libdotsec_napi.dylib dotsec-napi/npm/${{ matrix.npm_pkg }}/dotsec-core.node
          else
            cp target/${{ matrix.target }}/release/libdotsec_napi.so dotsec-napi/npm/${{ matrix.npm_pkg }}/dotsec-core.node
          fi

      - name: Smoke test native module
        if: matrix.can_test
        shell: bash
        run: |
          node -e "
            const m = require('./dotsec-napi/npm/${{ matrix.npm_pkg }}/dotsec-core.node');
            const keys = Object.keys(m);
            console.log('exports:', keys);
            if (!keys.includes('parse')) throw new Error('missing parse export');
            if (!keys.includes('validate')) throw new Error('missing validate export');
            if (!keys.includes('toJson')) throw new Error('missing toJson export');
            if (!keys.includes('format')) throw new Error('missing format export');
            const entries = m.parse('FOO=\"bar\"\n');
            if (entries[0].key !== 'FOO') throw new Error('parse returned wrong key');
            console.log('smoke test passed');
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set npm version
        working-directory: dotsec-napi/npm/${{ matrix.npm_pkg }}
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${{ needs.resolve-version.outputs.version }}"

      - name: Publish platform package
        working-directory: dotsec-napi/npm/${{ matrix.npm_pkg }}
        run: npm publish --tag ${{ needs.resolve-version.outputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meta:
    name: Publish @dotsec/core
    needs: [resolve-version, build]
    if: always() && needs.resolve-version.result == 'success' && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        working-directory: dotsec-napi
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish meta-package
        working-directory: dotsec-napi
        run: npm publish --tag ${{ needs.resolve-version.outputs.npm-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify:
    name: Verify published @dotsec/core
    needs: [resolve-version, publish-meta]
    if: needs.publish-meta.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Wait for npm propagation
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          for i in $(seq 1 30); do
            if npm view "@dotsec/core@$VERSION" version 2>/dev/null; then
              echo "Package available after ${i}0s"
              exit 0
            fi
            echo "Waiting for @dotsec/core@$VERSION to appear on npm... (attempt $i/30)"
            sleep 10
          done
          echo "Package not available after 5 minutes"
          exit 1

      - name: Install and test @dotsec/core from npm
        run: |
          npm install @dotsec/core@${{ needs.resolve-version.outputs.version }}
          node -e "
            const m = require('@dotsec/core');
            const entries = m.parse('FOO=\"bar\"\n');
            if (entries[0].key !== 'FOO') throw new Error('parse failed');
            if (entries[0].value !== 'bar') throw new Error('wrong value');
            const errors = m.validate('# @bogus\nX=1\n');
            if (errors.length === 0) throw new Error('validate should have found errors');
            console.log('verification passed');
          "
